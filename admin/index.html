<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Content Manager</title>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <style>
      /* Hide GitHub icon and replace button text */
      [class*="LoginButton"] svg { display: none !important; }
      [class*="LoginButton"]::after {
        content: "Login with Google";
        font-size: 18px;
      }
      [class*="LoginButton"] span { display: none !important; }
    </style>
    <script>
      // Replace "Login with GitHub" text and icon after CMS loads
      window.addEventListener('load', function() {
        setTimeout(function() {
          var buttons = document.querySelectorAll('button');
          buttons.forEach(function(btn) {
            if (btn.textContent.includes('GitHub')) {
              btn.innerHTML = '<span style="display:inline-flex;align-items:center;gap:8px;">' +
                '<svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>' +
                'Login with Google</span>';
            }
          });
        }, 1000);
      });

      // Custom preview template for blog posts
      var BlogPreview = createClass({
        render: function() {
          var entry = this.props.entry;
          var title = entry.getIn(['data', 'title']) || '';
          var description = entry.getIn(['data', 'description']) || '';
          var heroImage = entry.getIn(['data', 'heroImage']);
          var pubDate = entry.getIn(['data', 'pubDate']);
          var body = this.props.widgetFor('body');

          var dateStr = '';
          if (pubDate) {
            var d = new Date(pubDate);
            if (!isNaN(d)) {
              dateStr = d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
            }
          }

          var imageWidget = this.props.widgetFor('heroImage');

          return h('div', { style: {
              fontFamily: "'Source Sans 3', 'Segoe UI', sans-serif",
              background: '#f9fafb',
              minHeight: '100vh',
              padding: 0,
              margin: 0,
            }},
            // Header
            h('header', { style: {
                background: '#fff',
                borderBottom: '1px solid #e5e7eb',
                padding: '16px 32px',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'space-between',
              }},
              h('span', { style: { color: '#7C6A8F', fontFamily: "'Libre Baskerville', Georgia, serif", fontWeight: 'bold', fontSize: '18px' }}, 'Wendy Rodrich'),
              h('div', { style: { display: 'flex', gap: '24px' }},
                h('span', { style: { color: '#6b7280', fontSize: '14px' }}, 'Home'),
                h('span', { style: { color: '#6b7280', fontSize: '14px' }}, 'Journal')
              )
            ),
            // Article
            h('main', { style: { maxWidth: '720px', margin: '0 auto', padding: '48px 32px' }},
              // Back link
              h('a', { style: { color: '#6b7280', fontSize: '14px', textDecoration: 'none', display: 'inline-flex', alignItems: 'center', gap: '8px', marginBottom: '32px' }}, '\u2190 Back to Journal'),
              // Card
              h('article', { style: {
                  background: '#fff',
                  borderRadius: '8px',
                  border: '1px solid #e5e7eb',
                  overflow: 'hidden',
                }},
                // Hero image
                heroImage && imageWidget
                  ? h('div', { style: { width: '100%', height: '280px', overflow: 'hidden', background: '#f3f4f6' }},
                      h('div', { style: { width: '100%', height: '100%' }}, imageWidget)
                    )
                  : null,
                // Content area
                h('div', { style: { padding: '32px 48px' }},
                  // Date + title header
                  h('header', { style: { marginBottom: '32px', paddingBottom: '32px', borderBottom: '1px solid #e5e7eb' }},
                    dateStr && h('time', { style: { fontSize: '14px', color: '#6b7280' }}, dateStr),
                    h('h1', { style: {
                        color: '#7C6A8F',
                        fontFamily: "'Libre Baskerville', Georgia, serif",
                        fontSize: '32px',
                        fontWeight: 'bold',
                        marginTop: '12px',
                        lineHeight: 1.3,
                      }}, title),
                    description && h('p', { style: { color: '#6b7280', fontSize: '18px', marginTop: '16px', lineHeight: 1.6 }}, description)
                  ),
                  // Body
                  h('div', { style: {
                      color: '#374151',
                      lineHeight: 1.75,
                      fontSize: '16px',
                    }}, body)
                )
              ),
              // Author box
              h('div', { style: {
                  marginTop: '48px',
                  padding: '24px',
                  background: '#fff',
                  borderRadius: '8px',
                  border: '1px solid #e5e7eb',
                  display: 'flex',
                  alignItems: 'center',
                  gap: '24px',
                }},
                h('div', { style: { width: '64px', height: '64px', borderRadius: '50%', background: '#7C6A8F', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontFamily: "'Libre Baskerville', Georgia, serif", fontSize: '24px', fontWeight: 'bold', flexShrink: 0 }}, 'W'),
                h('div', {},
                  h('p', { style: { fontWeight: 600, margin: 0 }}, 'Wendy Rodrich'),
                  h('p', { style: { color: '#6b7280', fontSize: '14px', margin: '4px 0 0' }}, 'Multi-Brand Founder | Beauty, AI & Luxury E-Commerce'),
                  h('span', { style: { color: '#C9A96E', fontSize: '14px' }}, 'LinkedIn \u2192')
                )
              )
            )
          );
        }
      });

      CMS.registerPreviewTemplate('blog', BlogPreview);

      // Load Google Fonts for preview
      CMS.registerPreviewStyle('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600;700&display=swap');
    </script>
  </body>
</html>
